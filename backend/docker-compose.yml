version: "3.9"

services:
  #========= Databases =========
  auth-db:
    image: postgres:16-alpine
    container_name: ghabetna_auth_db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  forest-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: ghabetna_forest_db
    environment:
      POSTGRES_USER: ${FOREST_DB_USER}
      POSTGRES_PASSWORD: ${FOREST_DB_PASSWORD}
      POSTGRES_DB: ${FOREST_DB_NAME}
    ports:
      - "${FOREST_DB_PORT}:5432"
    volumes:
      - forest_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${FOREST_DB_USER} -d ${FOREST_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  incident-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: ghabetna_incident_db
    environment:
      POSTGRES_USER: ${INCIDENT_DB_USER}
      POSTGRES_PASSWORD: ${INCIDENT_DB_PASSWORD}
      POSTGRES_DB: ${INCIDENT_DB_NAME}
    ports:
      - "${INCIDENT_DB_PORT}:5432"
    volumes:
      - incident_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${INCIDENT_DB_USER} -d ${INCIDENT_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  analytics-db:
    image: postgres:16-alpine
    container_name: ghabetna_analytics_db
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    ports:
      - "${ANALYTICS_DB_PORT}:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  #========= Redis =========
  redis:
    image: redis:7-alpine
    container_name: ghabetna_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  #========= n8n =========
  n8n:
    image: n8nio/n8n:latest
    container_name: ghabetna_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=Africa/Tunis
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - n8n_data:/home/node/.n8n
  #========= Services =========
  chat-service:
    build: ./services/chat_service
    container_name: ghabetna_chat_service
    env_file: .env
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CHROMA_PERSIST_DIR: /app/chroma_db
    volumes:
      - ./services/chat_service:/app
      - chat_chroma:/app/chroma_db
    ports:
      - "8005:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  auth-service:
    build: ./services/auth_service
    container_name: ghabetna_auth_service
    env_file: .env
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
      AUTH_DATABASE_URL_SYNC: postgresql+psycopg2://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
      FOREST_SERVICE_URL: http://forest-service:8000
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: "http://localhost:3000"
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/security-event
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth_service:/app
    #the auth-service's entry point is in it's Dockerfile for because it handles the seed scrpit execution

  forest-service:
    build: ./services/forest_service
    container_name: ghabetna_forest_service
    env_file: .env
    environment:
      FOREST_DATABASE_URL: postgresql+asyncpg://${FOREST_DB_USER}:${FOREST_DB_PASSWORD}@forest-db:5432/${FOREST_DB_NAME}
      FOREST_DATABASE_URL_SYNC: postgresql+psycopg2://${FOREST_DB_USER}:${FOREST_DB_PASSWORD}@forest-db:5432/${FOREST_DB_NAME}
      REDIS_URL: redis://redis:6379/1
    depends_on:
      forest-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8002:8000"
    volumes:
      - ./services/forest_service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  api-gateway:
    build: ./services/api_gateway/
    container_name: ghabetna_api_gateway
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      FOREST_SERVICE_URL: http://forest-service:8000
      INCIDENT_SERVICE_URL: http://incident-service:8000
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      UPLOAD_DIR: /uploads
    depends_on:
      - auth-service
      - forest-service
      - incident-service
      - analytics-service
      - chat-service
    ports:
      - "8000:8000"
    volumes:
      - ./services/api_gateway:/app
      - incident_uploads:/uploads:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  incident-service:
    build: ./services/incident_service
    container_name: ghabetna_incident_service
    env_file: .env
    environment:
      INCIDENT_DATABASE_URL: postgresql+asyncpg://${INCIDENT_DB_USER}:${INCIDENT_DB_PASSWORD}@incident-db:5432/${INCIDENT_DB_NAME}
      INCIDENT_DATABASE_URL_SYNC: postgresql+psycopg2://${INCIDENT_DB_USER}:${INCIDENT_DB_PASSWORD}@incident-db:5432/${INCIDENT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /uploads
    depends_on:
      incident-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      forest-service:
        condition: service_started
    ports:
      - "8003:8000"
    volumes:
      - ./services/incident_service:/app
      - incident_uploads:/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  analytics-service:
    build: ./services/analytics_service
    container_name: ghabetna_analytics_service
    env_file: .env
    environment:
      INCIDENT_SERVICE_URL: http://incident-service:8000
      JWT_SECRET: ${JWT_SECRET}
      ANALYTICS_DATABASE_URL: postgresql+asyncpg://${ANALYTICS_DB_USER}:${ANALYTICS_DB_PASSWORD}@analytics-db:5432/${ANALYTICS_DB_NAME}
      SECURITY_WEBHOOK_SECRET: ${SECURITY_WEBHOOK_SECRET}
    depends_on:
      analytics-db:
        condition: service_healthy
    ports:
      - "8004:8000"
    volumes:
      - ./services/analytics_service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ../flutter_app
    container_name: ghabetna_frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  auth_db_data:
  forest_db_data:
  incident_db_data:
  analytics_db_data:
  redis_data:
  incident_uploads:
  n8n_data:
  chat_chroma:
